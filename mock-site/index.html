<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPW Hunt Code Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <p class="site-header__eyebrow">Colorado Parks and Wildlife</p>
        <h1>Big Game Application Worksheet</h1>
        <p class="site-header__intro">
          Mock hunt code entry page for extension testing.
        </p>
      </header>

      <main class="content">
        <section class="form-card">
          <div class="form-card__header">
            <div>
              <p class="section-kicker">Hunt Codes</p>
              <h2>Primary choice entries</h2>
            </div>
            <span class="status-pill">Draft</span>
          </div>

          <form class="application-grid">
            <fieldset class="application-row">
              <legend>Choice 1</legend>
              <div class="inline-fields">
                <label class="field field--short">
                  <span>Species</span>
                  <input id="application1.code_species" value="" />
                </label>
                <label class="field field--short">
                  <span>Subtype</span>
                  <input id="application1.code_speciessubtype" value="" />
                </label>
                <label class="field field--medium">
                  <span>Location</span>
                  <input id="application1.code_huntlocation" value="" />
                </label>
                <label class="field field--medium">
                  <span>Date</span>
                  <input id="application1.code_dateperiod" value="" />
                </label>
                <label class="field field--short">
                  <span>Weapon</span>
                  <input id="application1.code_weapon" value="" />
                </label>
              </div>
            </fieldset>

            <fieldset class="application-row">
              <legend>Choice 2</legend>
              <div class="inline-fields">
                <label class="field field--short">
                  <span>Species</span>
                  <input id="application2.code_species" value="" />
                </label>
                <label class="field field--short">
                  <span>Subtype</span>
                  <input id="application2.code_speciessubtype" value="" />
                </label>
                <label class="field field--medium">
                  <span>Location</span>
                  <input id="application2.code_huntlocation" value="" />
                </label>
                <label class="field field--medium">
                  <span>Date</span>
                  <input id="application2.code_dateperiod" value="" />
                </label>
                <label class="field field--short">
                  <span>Weapon</span>
                  <input id="application2.code_weapon" value="" />
                </label>
              </div>
            </fieldset>

            <fieldset class="application-row">
              <legend>Choice 3</legend>
              <div class="inline-fields">
                <label class="field field--short">
                  <span>Species</span>
                  <input id="application3.code_species" value="" />
                </label>
                <label class="field field--short">
                  <span>Subtype</span>
                  <input id="application3.code_speciessubtype" value="" />
                </label>
                <label class="field field--medium">
                  <span>Location</span>
                  <input id="application3.code_huntlocation" value="" />
                </label>
                <label class="field field--medium">
                  <span>Date</span>
                  <input id="application3.code_dateperiod" value="" />
                </label>
                <label class="field field--short">
                  <span>Weapon</span>
                  <input id="application3.code_weapon" value="" />
                </label>
              </div>
            </fieldset>

            <fieldset class="application-row">
              <legend>Choice 4</legend>
              <div class="inline-fields">
                <label class="field field--short">
                  <span>Species</span>
                  <input id="application4.code_species" value="" />
                </label>
                <label class="field field--short">
                  <span>Subtype</span>
                  <input id="application4.code_speciessubtype" value="" />
                </label>
                <label class="field field--medium">
                  <span>Location</span>
                  <input id="application4.code_huntlocation" value="" />
                </label>
                <label class="field field--medium">
                  <span>Date</span>
                  <input id="application4.code_dateperiod" value="" />
                </label>
                <label class="field field--short">
                  <span>Weapon</span>
                  <input id="application4.code_weapon" value="" />
                </label>
              </div>
            </fieldset>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
